name: Bot Quet Socolive V5 Adaptive

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: "URL trận/BLV cần test riêng; để trống để quét tự động"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. Lấy code từ kho về
        uses: actions/checkout@v4

      - name: 2. Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Cài đặt Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 4. Quét link Socolive
        env:
          # Bắt Python đẩy log ra GitHub ngay, không giữ trong bộ đệm.
          PYTHONUNBUFFERED: "1"
          PYTHONUTF8: "1"

          SOCOLIVE_MATCH_CONCURRENCY: "2"
          SOCOLIVE_ROOM_WAIT_SECONDS: "8"
          SOCOLIVE_RETRY_ROOM_WAIT_SECONDS: "12"
          SOCOLIVE_MAX_ROOMS_PER_MATCH: "3"
          SOCOLIVE_MAX_SUCCESSFUL_ROOMS_PER_MATCH: "1"

          # Tắt request HTTP thừa vì stream chỉ xuất hiện sau khi player chạy JS.
          SOCOLIVE_HTTP_FIRST: "0"

          # Bật bắt network ở lớp Chromium để chẩn đoán chính xác hơn.
          SOCOLIVE_ENABLE_CDP: "1"

          # Dùng chung một session, chỉ mở tối đa 2 player.
          SOCOLIVE_NAVIGATION_MIN_INTERVAL_SECONDS: "4"

          # Nếu Cloudflare trả 429, toàn bộ worker nghỉ rồi thử lại đúng URL.
          SOCOLIVE_RATE_LIMIT_COOLDOWN_SECONDS: "60"
          SOCOLIVE_RATE_LIMIT_MAX_RETRIES: "2"

          # Quét BLV theo vòng: mỗi trận được thử một phòng trước.
          SOCOLIVE_ROUND_COOLDOWN_SECONDS: "4"

          # Lưu screenshot/HTML/network cho phòng không bắt được stream.
          SOCOLIVE_SAVE_FAILURE_ARTIFACTS: "1"

          TEST_URL: ${{ inputs.test_url }}
        run: |
          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Bắt đầu quét Socolive ==="
          echo "Python: $(python --version)"
          echo "Concurrency=$SOCOLIVE_MATCH_CONCURRENCY | interval=${SOCOLIVE_NAVIGATION_MIN_INTERVAL_SECONDS}s | 429 cooldown=${SOCOLIVE_RATE_LIMIT_COOLDOWN_SECONDS}s"

          if [ -n "$TEST_URL" ]; then
            echo "Test riêng URL: $TEST_URL"
            python -u main.py "$TEST_URL"
          else
            echo "Chế độ quét toàn bộ trận đang/sắp đá"
            python -u main.py
          fi

          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Kết thúc quét ==="

      - name: 5. Kiểm tra file kết quả
        if: always()
        run: |
          echo "=== File tại thư mục chạy ==="
          ls -lah
          echo "=== File chẩn đoán thất bại ==="
          find socolive_failures -maxdepth 1 -type f -printf "%f %k KB\n" 2>/dev/null | head -200 || true

      - name: 6. Tải debug dưới dạng Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socolive-debug-run-${{ github.run_number }}
          path: |
            socolive_live.m3u
            socolive_matches.json
            socolive_debug.json
            socolive_failures/
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      - name: 7. Lưu kết quả chính lên GitHub
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          for file in             socolive_live.m3u             socolive_matches.json             socolive_debug.json
          do
            if [ -e "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Không có file kết quả nào thay đổi."
          else
            git commit -m "Bot auto update Socolive + debug"
            git push
          fi
