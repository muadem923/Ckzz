name: Bot Quet Socolive V6 Burst

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: "URL trận/BLV cần test riêng; để trống để quét tự động"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. Lấy code từ kho về
        uses: actions/checkout@v4

      - name: 2. Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Cài đặt Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 4. Quét link Socolive
        env:
          # Bắt Python đẩy log ra GitHub ngay, không giữ trong bộ đệm.
          PYTHONUNBUFFERED: "1"
          PYTHONUTF8: "1"

          # Giữ đúng kiểu V3: 4 tab chạy nhanh, không giãn từng navigation.
          SOCOLIVE_MATCH_CONCURRENCY: "4"
          SOCOLIVE_ROOM_WAIT_SECONDS: "7"
          SOCOLIVE_MAX_ROOMS_PER_MATCH: "1"
          SOCOLIVE_MAX_SUCCESSFUL_ROOMS_PER_MATCH: "1"

          # Không gọi HTTP trước khi mở player.
          SOCOLIVE_HTTP_FIRST: "0"

          # Bắt request ở tầng Chromium; không tạo thêm request mạng.
          SOCOLIVE_ENABLE_CDP: "1"

          # Gặp 429 thì dừng mở trang mới, không retry làm khóa nặng hơn.
          SOCOLIVE_STOP_ON_429: "1"

          TEST_URL: ${{ inputs.test_url }}
        run: |
          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Bắt đầu quét Socolive ==="
          echo "Python: $(python --version)"
          echo "Concurrency=$SOCOLIVE_MATCH_CONCURRENCY | max_rooms=$SOCOLIVE_MAX_ROOMS_PER_MATCH | stop_on_429=$SOCOLIVE_STOP_ON_429"

          if [ -n "$TEST_URL" ]; then
            echo "Test riêng URL: $TEST_URL"
            python -u main.py "$TEST_URL"
          else
            echo "Chế độ quét toàn bộ trận đang/sắp đá"
            python -u main.py
          fi

          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Kết thúc quét ==="

      - name: 5. Kiểm tra file kết quả
        if: always()
        run: |
          echo "=== File tại thư mục chạy ==="
          ls -lah
          echo "=== File chẩn đoán thất bại ==="
          find socolive_failures -maxdepth 1 -type f -printf "%f %k KB\n" 2>/dev/null | head -200 || true

      - name: 6. Tải debug dưới dạng Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socolive-debug-run-${{ github.run_number }}
          path: |
            socolive_live.m3u
            socolive_matches.json
            socolive_debug.json
            socolive_failures/
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      - name: 7. Lưu kết quả chính lên GitHub
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          for file in             socolive_live.m3u             socolive_matches.json             socolive_debug.json
          do
            if [ -e "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Không có file kết quả nào thay đổi."
          else
            git commit -m "Bot auto update Socolive + debug"
            git push
          fi
