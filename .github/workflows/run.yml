name: Bot Quet Socolive V8 Chain

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: "URL trận/BLV cần test riêng; để trống để chạy chuỗi tự động"
        required: false
        default: ""
        type: string

concurrency:
  group: socolive-v8-chain-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 1. Lấy source và checkpoint mới nhất
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Hiện IP runner
        run: |
          echo "Runner public IP:"
          curl --connect-timeout 5 --max-time 10 -sS https://api.ipify.org || true
          echo

      - name: 3. Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 4. Cài Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 5. Quét Socolive
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONUTF8: "1"

          SOCOLIVE_MATCH_CONCURRENCY: "4"
          SOCOLIVE_ROOM_WAIT_SECONDS: "7"
          SOCOLIVE_MAX_ROOMS_PER_MATCH: "1"
          SOCOLIVE_MAX_SUCCESSFUL_ROOMS_PER_MATCH: "1"
          SOCOLIVE_HTTP_FIRST: "0"
          SOCOLIVE_ENABLE_CDP: "1"
          SOCOLIVE_STOP_ON_429: "1"

          SOCOLIVE_STATE_MAX_AGE_MINUTES: "20"
          SOCOLIVE_STATE_MAX_CHAIN_RUNS: "12"
          SOCOLIVE_STATE_MAX_NO_PROGRESS_RUNS: "2"

          TEST_URL: ${{ inputs.test_url }}
        run: |
          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Bắt đầu ==="
          echo "Concurrency=$SOCOLIVE_MATCH_CONCURRENCY | max_rooms=$SOCOLIVE_MAX_ROOMS_PER_MATCH"

          if [ -n "$TEST_URL" ]; then
            echo "Test riêng: $TEST_URL"
            python -u main.py "$TEST_URL"
          else
            echo "Chế độ chain: chỉ quét pending/chưa có link"
            python -u main.py
          fi

          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Kết thúc ==="

      - name: 6. Đọc quyết định chạy tiếp
        id: resume
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          state_path = Path("socolive_state.json")
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          defaults = {
              "dispatch_next": "false",
              "pending_count": "0",
              "progress_count": "0",
              "completed_count": "0",
              "chain_runs": "0",
              "stop_reason": "state_missing",
          }

          if state_path.exists():
              try:
                  state = json.loads(
                      state_path.read_text(encoding="utf-8")
                  )
                  defaults.update(
                      {
                          "dispatch_next": str(
                              bool(state.get("dispatch_next"))
                          ).lower(),
                          "pending_count": str(
                              int(state.get("pending_count", 0))
                          ),
                          "progress_count": str(
                              int(state.get("progress_count", 0))
                          ),
                          "completed_count": str(
                              int(state.get("completed_count", 0))
                          ),
                          "chain_runs": str(
                              int(state.get("chain_runs", 0))
                          ),
                          "stop_reason": str(
                              state.get("stop_reason", "")
                          ),
                      }
                  )
              except Exception as exc:
                  defaults["stop_reason"] = (
                      f"state_error_{type(exc).__name__}"
                  )

          with output_path.open("a", encoding="utf-8") as handle:
              for key, value in defaults.items():
                  handle.write(f"{key}={value}\n")

          print("Resume decision:", defaults)
          PY

      - name: 7. Upload kết quả và checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socolive-chain-run-${{ github.run_number }}
          path: |
            socolive_live.m3u
            socolive_matches.json
            socolive_debug.json
            socolive_state.json
            socolive_pending.json
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      - name: 8. Commit checkpoint
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for file in \
            socolive_live.m3u \
            socolive_matches.json \
            socolive_debug.json \
            socolive_state.json \
            socolive_pending.json
          do
            if [ -e "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Không có thay đổi cần commit."
            exit 0
          fi

          git commit -m "Socolive chain checkpoint run $GITHUB_RUN_NUMBER"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - name: 9. Gọi runner mới ngay lập tức
        if: >
          always() &&
          steps.resume.outputs.dispatch_next == 'true' &&
          inputs.test_url == ''
        env:
          GH_TOKEN: ${{ github.token }}
          PENDING_COUNT: ${{ steps.resume.outputs.pending_count }}
          PROGRESS_COUNT: ${{ steps.resume.outputs.progress_count }}
          CHAIN_RUNS: ${{ steps.resume.outputs.chain_runs }}
        shell: bash
        run: |
          echo "Còn $PENDING_COUNT trận pending."
          echo "Run vừa rồi lấy thêm $PROGRESS_COUNT trận."
          echo "Đang gọi workflow run tiếp theo, chain=$CHAIN_RUNS..."

          payload=$(python - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "ref": os.environ["GITHUB_REF_NAME"],
                      "inputs": {
                          "test_url": ""
                      },
                  }
              )
          )
          PY
          )

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/run.yml/dispatches" \
            -d "$payload"

          echo "✅ Đã xếp một workflow run mới vào hàng đợi."

      - name: 10. Tổng kết chuỗi
        if: always()
        run: |
          echo "Completed=${{ steps.resume.outputs.completed_count }}"
          echo "Pending=${{ steps.resume.outputs.pending_count }}"
          echo "Progress run này=${{ steps.resume.outputs.progress_count }}"
          echo "Chain=${{ steps.resume.outputs.chain_runs }}"
          echo "Dispatch next=${{ steps.resume.outputs.dispatch_next }}"
          echo "Stop reason=${{ steps.resume.outputs.stop_reason }}"
