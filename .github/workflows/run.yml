name: Bot Quet Socolive V10.4.1 Date Display Fix

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: "URL trận/BLV cần test riêng; để trống để chạy chuỗi tự động"
        required: false
        default: ""
        type: string
      reset_chain:
        description: "Reset stall guard và tải mới trang chủ"
        required: false
        default: false
        type: boolean

concurrency:
  group: socolive-v10-4-1-date-display-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. Lấy source và checkpoint mới nhất
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Hiện IP runner
        run: |
          echo "Runner public IP:"
          curl --connect-timeout 5 --max-time 10 -sS https://api.ipify.org || true
          echo

      - name: 3. Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 4. Cài Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 5. Quét Socolive
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONUTF8: "1"

          # Domain hiện tại; dùng chung cho trang chủ, Referer và Origin.
          SOCOLIVE_TARGET_URL: "https://socolivep.cv/"

          SOCOLIVE_MATCH_CONCURRENCY: "1"
          SOCOLIVE_ROOM_WAIT_SECONDS: "12"
          # Một flow quét tối đa toàn bộ BLV mỗi trận một lần.
          SOCOLIVE_MAX_ROOMS_PER_MATCH: "12"

          # Cầu chì thời gian toàn workflow.
          SOCOLIVE_GLOBAL_ROOM_BUDGET: "48"

          SOCOLIVE_MAX_SUCCESSFUL_ROOMS_PER_MATCH: "24"

          # Mục tiêu tối đa 10 stream-ID/BLV cho mỗi trận.
          SOCOLIVE_MAX_STREAMS_PER_MATCH: "24"

          # Mỗi run chỉ mở tối đa 3 trang BLV/trận.
          # Mỗi trang sẽ quét toàn bộ HTML/config để lấy nhiều link.
          SOCOLIVE_EMBEDDED_HARVEST_WAIT_SECONDS: "6.0"

          # Queue hữu hạn: mỗi BLV chỉ thử tối đa hai lần tổng cộng.
          SOCOLIVE_ROOM_EMPTY_MAX_ATTEMPTS: "2"

          # Tối đa hai nguồn; chỉ cần một link hợp lệ là success.
          SOCOLIVE_MAX_STREAMS_PER_BLV: "2"

          # Giữ tab tối thiểu 6 giây sau stream đầu, tối đa 12 giây,
          # quét lặp mỗi 0.8 giây và đóng khi yên 3.5 giây.
          SOCOLIVE_EXTRA_WAIT_AFTER_STREAM: "4.0"
          SOCOLIVE_HARVEST_MAX_SECONDS: "12"
          SOCOLIVE_HARVEST_POLL_SECONDS: "0.8"
          SOCOLIVE_HARVEST_QUIET_SECONDS: "3.5"

          SOCOLIVE_HTTP_FIRST: "0"
          SOCOLIVE_ENABLE_CDP: "1"
          SOCOLIVE_STOP_ON_429: "1"

          # Khung quét:
          # trận đã bắt đầu trong 180 phút gần nhất
          # hoặc sẽ bắt đầu trong 240 phút tới.
          SOCOLIVE_SCAN_BEFORE_MINUTES: "180"
          SOCOLIVE_SCAN_AFTER_MINUTES: "240"
          SOCOLIVE_SCAN_ALL: "0"

          SOCOLIVE_STATE_MAX_AGE_MINUTES: "180"
          SOCOLIVE_STATE_MAX_CHAIN_RUNS: "8"
          SOCOLIVE_STATE_MAX_NO_PROGRESS_RUNS: "2"
          SOCOLIVE_STATE_MAX_UNCHANGED_PENDING_RUNS: "2"
          SOCOLIVE_STATE_MAX_RATE_LIMIT_ONLY_RUNS: "2"

          # Tiếp tục khi còn pending, nhưng stall guard sẽ tự dừng khi bất thường.
          SOCOLIVE_CHAIN_UNTIL_PENDING_EMPTY: "1"
          SOCOLIVE_RESUME_STATE_FIRST: "1"
          SOCOLIVE_RESET_CHAIN_GUARD: ${{ inputs.reset_chain && '1' || '0' }}
          SOCOLIVE_TOKEN_EXPIRY_GRACE_SECONDS: "60"
          SOCOLIVE_DELAY_BETWEEN_ROOMS: "2.0"

          # Catalog giữ link xuyên nhiều workflow, kể cả khi trận rơi khỏi
          # khung quét hiện tại. Sau 6 giờ tính từ giờ bắt đầu mới loại.
          SOCOLIVE_CATALOG_RETENTION_AFTER_START_MINUTES: "360"
          SOCOLIVE_CATALOG_RETENTION_UNSEEN_MINUTES: "240"

          TEST_URL: ${{ inputs.test_url }}
        run: |
          # Không cho bước sau đọc nhầm quyết định của run trước.
          rm -f socolive_chain_decision.json

          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Bắt đầu ==="
          echo "Concurrency=$SOCOLIVE_MATCH_CONCURRENCY | room_pages/run=$SOCOLIVE_MAX_ROOMS_PER_MATCH | global_budget=$SOCOLIVE_GLOBAL_ROOM_BUDGET"
          echo "Long harvest: wait=${SOCOLIVE_ROOM_WAIT_SECONDS}s | max=${SOCOLIVE_HARVEST_MAX_SECONDS}s | 2 nguồn/BLV"
          echo "Queue hữu hạn: mỗi BLV tối đa 2 lượt | 1 link hợp lệ = success"
          echo "Chain an toàn: hard_max=$SOCOLIVE_STATE_MAX_CHAIN_RUNS | stall=2 run | resume state trước"
          echo "V10.4.1: tên M3U có đủ giờ + ngày; tvg-name cũng có lịch thi đấu"
          echo "V10.4: attempts_total không reset; success/exhausted là trạng thái terminal"
          echo "Playlist: dựng từ catalog tích lũy, không ghi đè bằng riêng kết quả run hiện tại"
          echo "Scan window: -${SOCOLIVE_SCAN_BEFORE_MINUTES} phút / +${SOCOLIVE_SCAN_AFTER_MINUTES} phút | scan_all=$SOCOLIVE_SCAN_ALL"

          if [ -n "$TEST_URL" ]; then
            echo "Test riêng: $TEST_URL"
            python -u main.py "$TEST_URL"
          else
            echo "Chế độ chain: chỉ quét pending/chưa có link trong tập trận hiện tại"
            python -u main.py
          fi

          echo "=== $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Kết thúc ==="

      - name: 6. Đọc quyết định của đúng run hiện tại
        id: resume
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          decision_path = Path("socolive_chain_decision.json")
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          values = {
              "dispatch_next": "false",
              "pending_count": "0",
              "progress_count": "0",
              "completed_count": "0",
              "total_match_count": "0",
              "chain_runs": "0",
              "stop_reason": "decision_missing",
              "pending_room_count": "0",
              "no_progress_runs": "0",
              "unchanged_pending_runs": "0",
              "rate_limit_only_runs": "0",
          }

          if decision_path.exists():
              try:
                  decision = json.loads(
                      decision_path.read_text(encoding="utf-8")
                  )
                  values.update(
                      {
                          "dispatch_next": str(
                              bool(decision.get("dispatch_next"))
                          ).lower(),
                          "pending_count": str(
                              int(decision.get("pending_count", 0))
                          ),
                          "progress_count": str(
                              int(decision.get("progress_count", 0))
                          ),
                          "completed_count": str(
                              int(decision.get("completed_count", 0))
                          ),
                          "total_match_count": str(
                              int(decision.get("total_match_count", 0))
                          ),
                          "chain_runs": str(
                              int(decision.get("chain_runs", 0))
                          ),
                          "stop_reason": str(
                              decision.get("stop_reason", "")
                          ),
                          "pending_room_count": str(
                              int(decision.get("pending_room_count", 0))
                          ),
                          "no_progress_runs": str(
                              int(decision.get("no_progress_runs", 0))
                          ),
                          "unchanged_pending_runs": str(
                              int(decision.get("unchanged_pending_runs", 0))
                          ),
                          "rate_limit_only_runs": str(
                              int(decision.get("rate_limit_only_runs", 0))
                          ),
                      }
                  )
              except Exception as exc:
                  values["stop_reason"] = (
                      f"decision_error_{type(exc).__name__}"
                  )

          with output_path.open("a", encoding="utf-8") as handle:
              for key, value in values.items():
                  handle.write(f"{key}={value}\n")

          print("Current-run decision:", values)
          PY

      - name: 7. Upload kết quả và checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socolive-chain-run-${{ github.run_number }}
          path: |
            socolive_live.m3u
            socolive_matches.json
            socolive_debug.json
            socolive_state.json
            socolive_pending.json
            socolive_chain_decision.json
            socolive_catalog.json
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      - name: 8. Commit checkpoint
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for file in \
            socolive_live.m3u \
            socolive_matches.json \
            socolive_debug.json \
            socolive_state.json \
            socolive_pending.json \
            socolive_catalog.json
          do
            if [ -e "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "Không có thay đổi cần commit."
            exit 0
          fi

          git commit -m "Socolive chain checkpoint run $GITHUB_RUN_NUMBER"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"

      - name: 9. Gọi runner mới ngay lập tức
        if: >
          always() &&
          steps.resume.outputs.dispatch_next == 'true' &&
          inputs.test_url == ''
        env:
          GH_TOKEN: ${{ github.token }}
          PENDING_COUNT: ${{ steps.resume.outputs.pending_count }}
          PROGRESS_COUNT: ${{ steps.resume.outputs.progress_count }}
          CHAIN_RUNS: ${{ steps.resume.outputs.chain_runs }}
        shell: bash
        run: |
          echo "Còn $PENDING_COUNT trận pending."
          echo "Run vừa rồi lấy thêm $PROGRESS_COUNT link."
          echo "Đang gọi workflow run tiếp theo, chain=$CHAIN_RUNS..."

          payload=$(python - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "ref": os.environ["GITHUB_REF_NAME"],
                      "inputs": {
                          "test_url": "",
                          "reset_chain": "false"
                      },
                  }
              )
          )
          PY
          )

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/run.yml/dispatches" \
            -d "$payload"

          echo "✅ Đã xếp một workflow run mới vào hàng đợi."

      - name: 10. Tổng kết chuỗi
        if: always()
        run: |
          echo "Completed=${{ steps.resume.outputs.completed_count }}/${{ steps.resume.outputs.total_match_count }}"
          echo "Pending=${{ steps.resume.outputs.pending_count }}"
          echo "Progress run này=${{ steps.resume.outputs.progress_count }}"
          echo "Chain=${{ steps.resume.outputs.chain_runs }}"
          echo "Dispatch next=${{ steps.resume.outputs.dispatch_next }}"
          echo "Pending BLV=${{ steps.resume.outputs.pending_room_count }}"
          echo "No-progress streak=${{ steps.resume.outputs.no_progress_runs }}"
          echo "Unchanged-pending streak=${{ steps.resume.outputs.unchanged_pending_runs }}"
          echo "429-only streak=${{ steps.resume.outputs.rate_limit_only_runs }}"
          echo "Stop reason=${{ steps.resume.outputs.stop_reason }}"
